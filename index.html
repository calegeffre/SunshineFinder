<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNW Sunshine Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    header {
      background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
      padding: 1rem 2rem;
      text-align: center;
      border-bottom: 1px solid #0f3460;
    }
    h1 { 
      font-size: 1.8rem; 
      color: #ffd700;
      margin-bottom: 0.25rem;
    }
    .subtitle { 
      color: #94a3b8; 
      font-size: 0.9rem; 
    }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .tab {
      padding: 0.6rem 1.2rem;
      background: transparent;
      border: 1px solid #0f3460;
      color: #94a3b8;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .tab:hover {
      background: rgba(255, 215, 0, 0.1);
      border-color: #ffd700;
      color: #ffd700;
    }
    .tab.active {
      background: #ffd700;
      color: #1a1a2e;
      border-color: #ffd700;
      font-weight: 600;
    }
    #map {
      height: calc(100vh - 180px);
      width: 100%;
    }
    .legend {
      background: rgba(26, 26, 46, 0.95);
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 1rem;
      margin: 0.5rem;
    }
    .legend h4 {
      color: #ffd700;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.25rem 0;
      font-size: 0.85rem;
    }
    .legend-emoji {
      font-size: 1.2rem;
    }
    footer {
      background: #16213e;
      padding: 0.75rem;
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
      border-top: 1px solid #0f3460;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      background: rgba(26, 26, 46, 0.95);
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
    }
    .loading.hidden { display: none; }
    .spinner {
      font-size: 2rem;
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .city-popup {
      text-align: center;
    }
    .city-popup h3 {
      margin-bottom: 0.5rem;
      color: #1a1a2e;
    }
    .city-popup .weather-emoji {
      font-size: 2rem;
    }
    .city-popup .conditions {
      font-size: 0.9rem;
      color: #666;
    }
    .city-popup .temp {
      font-weight: bold;
      color: #333;
    }
    .top3-panel {
      background: rgba(26, 26, 46, 0.95);
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 1rem;
      margin: 0.5rem;
      min-width: 200px;
      max-width: 250px;
    }
    .top3-panel h4 {
      color: #ffd700;
      font-size: 0.95rem;
    }
    .top3-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(15, 52, 96, 0.4);
    }
    .top3-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .top3-rank {
      font-size: 1.2rem;
      min-width: 26px;
      text-align: center;
    }
    .top3-emoji {
      font-size: 1.2rem;
      min-width: 24px;
      text-align: center;
    }
    .top3-info {
      flex: 1;
      min-width: 0;
    }
    .top3-city {
      font-weight: 600;
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top3-dist {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 0.1rem;
    }
    .top3-none {
      color: #94a3b8;
      font-size: 0.85rem;
      text-align: center;
      padding: 0.5rem 0;
    }
    /* Collapsible panel styles */
    .panel-header {
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .top3-panel .panel-header {
      border-bottom: 1px solid #0f3460;
      padding-bottom: 0.5rem;
    }
    .top3-panel.panel-collapsed .panel-header {
      border-bottom: none;
      padding-bottom: 0;
    }
    .panel-toggle {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-left: 0.5rem;
      display: inline-block;
      transition: transform 0.2s;
      line-height: 1;
    }
    .panel-collapsed .panel-toggle {
      transform: rotate(-90deg);
    }
    .panel-body {
      overflow: hidden;
      transition: max-height 0.25s ease, margin-top 0.25s ease;
      max-height: 600px;
      margin-top: 0.75rem;
    }
    .legend .panel-body {
      margin-top: 0.5rem;
    }
    .panel-collapsed .panel-body {
      max-height: 0;
      margin-top: 0;
    }
    /* Mobile optimizations */
    @media (max-width: 640px) {
      header {
        padding: 0.6rem 1rem;
      }
      h1 {
        font-size: 1.3rem;
      }
      .subtitle {
        font-size: 0.8rem;
      }
      .tabs {
        margin-top: 0.5rem;
        gap: 0.3rem;
      }
      .tab {
        padding: 0.4rem 0.75rem;
        font-size: 0.8rem;
      }
      #map {
        height: calc(100vh - 130px);
      }
      .top3-panel,
      .legend {
        padding: 0.6rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>☀️ PNW Sunshine Finder</h1>
    <p class="subtitle">Real-time sun tracker across the Pacific Northwest</p>
    <div class="tabs">
      <button class="tab active" data-day="0">Today</button>
      <button class="tab" data-day="1">Tomorrow</button>
      <button class="tab" data-day="sat" id="satTab">Saturday</button>
      <button class="tab" data-day="sun" id="sunTab">Sunday</button>
    </div>
  </header>
  
  <div id="map"></div>
  
  <div class="loading" id="loading">
    <div class="spinner">☀️</div>
    <p>Checking the skies...</p>
  </div>
  
  <footer>
    Data from <a href="https://open-meteo.com/" style="color:#ffd700">Open-Meteo API</a> • 
    Updated: <span id="lastUpdated">-</span>
  </footer>

  <script>
    const MOBILE_BREAKPOINT = '(max-width: 640px)';

    // Pacific Northwest cities with coordinates
    const cities = [
      { name: 'Seattle', lat: 47.6062, lon: -122.3321 },
      { name: 'Bellingham', lat: 48.7519, lon: -122.4787 },
      { name: 'Vancouver, BC', lat: 49.2827, lon: -123.1207 },
      { name: 'Vantage', lat: 46.9454, lon: -119.9869 },
      { name: 'Spokane', lat: 47.6588, lon: -117.4260 },
      { name: 'Portland', lat: 45.5152, lon: -122.6784 },
      { name: 'Bend', lat: 44.0582, lon: -121.3153 },
      { name: 'North Bend, WA', lat: 47.4957, lon: -121.7868 },
      { name: 'Snoqualmie Pass', lat: 47.4281, lon: -121.4116 },
      { name: 'Crystal Mountain', lat: 46.56, lon: -121.29},
      { name: 'Stevens Pass', lat: 47.745, lon: -121.09},
      { name: 'Mazama', lat: 48.5918, lon: -120.4043 },

    // Weather codes - sunny/clear conditions
    const weatherCodes = {

      73: { desc: 'Snow', emoji: '❄️', sunny: false },
      75: { desc: 'Heavy Snow', emoji: '❄️', sunny: false },
      77: { desc: 'Snow Grains', emoji: '❄️', sunny: false },
      80: { desc: 'Rain Showers', emoji: '🌦️', sunny: false },
      81: { desc: 'Moderate Showers', emoji: '🌧️', sunny: false },
      82: { desc: 'Heavy Showers', emoji: '🌧️', sunny: false },
      85: { desc: 'Snow Showers', emoji: '🌨️', sunny: false },
      86: { desc: 'Heavy Snow Showers', emoji: '🌨️', sunny: false },
      95: { desc: 'Thunderstorm', emoji: '⛈️', sunny: false },
      96: { desc: 'Thunderstorm w/ Hail', emoji: '⛈️', sunny: false },
      99: { desc: 'Thunderstorm w/ Heavy Hail', emoji: '⛈️', sunny: false },
    };

    // Fallback weather descriptor for unrecognised WMO codes
    const UNKNOWN_WEATHER = { desc: 'Unknown', emoji: '❓', sunny: false };
    const SEATTLE_LAT = 47.6062;
    const SEATTLE_LON = -122.3321;

    // Additional outdoor activity hub towns used when main cities don't provide 3 sunny spots
    const fallbackCities = [
      { name: 'Sequim', lat: 48.0751, lon: -123.1068 },
      { name: 'Anacortes', lat: 48.5126, lon: -122.6127 },
      { name: 'Mount Vernon', lat: 48.4218, lon: -122.3340 },
      { name: 'Wenatchee', lat: 47.4235, lon: -120.3103 },
      { name: 'Ellensburg', lat: 46.9965, lon: -120.5478 },
      { name: 'Chelan', lat: 47.8360, lon: -120.0180 },
      { name: 'Yakima', lat: 46.6021, lon: -120.5059 },
      { name: 'Centralia', lat: 46.7162, lon: -122.9543 },
      { name: 'Hood River', lat: 45.7054, lon: -121.5219 },
      { name: 'Kelso', lat: 46.1468, lon: -122.9065 },
      { name: 'Astoria', lat: 46.1879, lon: -123.8313 },
      { name: 'The Dalles', lat: 45.5946, lon: -121.1787 },
      { name: 'Coeur d\'Alene', lat: 47.6777, lon: -116.7805 },
      { name: 'Tri-Cities', lat: 46.2396, lon: -119.1006 },
      { name: 'Sandpoint', lat: 48.2766, lon: -116.5534 },
      { name: 'Missoula', lat: 46.8721, lon: -113.9940 },
      { name: 'Boise', lat: 43.6150, lon: -116.2023 },
      { name: 'Medford', lat: 42.3265, lon: -122.8756 },
    ];

    // Broader set of cities polled when main + fallback still yield fewer than 3 sunny spots.
    // Sorted by the runtime distance calculation; defined here in rough geographic order.
    const expandedCities = [
      // Washington State coast / east (beyond main + fallback lists)
      { name: 'Victoria BC',        lat: 48.4284, lon: -123.3656 },
      { name: 'Aberdeen WA',        lat: 46.9759, lon: -123.8157 },
      { name: 'Ocean Shores WA',    lat: 47.0043, lon: -124.1557 },
      { name: 'Long Beach WA',      lat: 46.3518, lon: -124.0522 },
      { name: 'Okanogan WA',        lat: 48.3601, lon: -119.5734 },
      { name: 'Republic WA',        lat: 48.6498, lon: -118.7323 },
      { name: 'Colville WA',        lat: 48.5465, lon: -117.9090 },
      // Oregon (beyond Portland / Bend / Eugene / Medford)
      { name: 'Salem OR',           lat: 44.9429, lon: -123.0351 },
      { name: 'Grants Pass OR',     lat: 42.4393, lon: -123.3284 },
      { name: 'Klamath Falls OR',   lat: 42.2249, lon: -121.7817 },
      // British Columbia interior
      { name: 'Kelowna BC',         lat: 49.8880, lon: -119.4960 },
      { name: 'Kamloops BC',        lat: 50.6745, lon: -120.3273 },
      { name: 'Prince George BC',   lat: 53.9171, lon: -122.7497 },
      // Idaho (beyond Boise / Coeur d'Alene / Sandpoint)
      { name: 'Moscow ID',          lat: 46.7324, lon: -117.0002 },
      { name: 'Lewiston ID',        lat: 46.4165, lon: -117.0177 },
      { name: 'Twin Falls ID',      lat: 42.5558, lon: -114.4607 },
      // Montana (beyond Missoula)
      { name: 'Kalispell MT',       lat: 48.1920, lon: -114.3168 },
      { name: 'Helena MT',          lat: 46.5958, lon: -112.0270 },
      { name: 'Great Falls MT',     lat: 47.5002, lon: -111.3008 },
      { name: 'Billings MT',        lat: 45.7833, lon: -108.5007 },
      // Alberta, Canada
      { name: 'Calgary AB',         lat: 51.0447, lon: -114.0719 },
      { name: 'Edmonton AB',        lat: 53.5461, lon: -113.4938 },
      // Northern California
      { name: 'Eureka CA',          lat: 40.8021, lon: -124.1637 },
      { name: 'Redding CA',         lat: 40.5865, lon: -122.3917 },
      // Nevada
      { name: 'Reno NV',            lat: 39.5296, lon: -119.8138 },
      // Central / Southern California
      { name: 'Sacramento CA',      lat: 38.5816, lon: -121.4944 },
      { name: 'San Francisco CA',   lat: 37.7749, lon: -122.4194 },
      { name: 'Los Angeles CA',     lat: 34.0522, lon: -118.2437 },
      { name: 'San Diego CA',       lat: 32.7157, lon: -117.1611 },
      // Intermountain West
      { name: 'Salt Lake City UT',  lat: 40.7608, lon: -111.8910 },
      { name: 'Las Vegas NV',       lat: 36.1699, lon: -115.1398 },
      { name: 'Phoenix AZ',         lat: 33.4484, lon: -112.0740 },
      { name: 'Denver CO',          lat: 39.7392, lon: -104.9903 },
    ];

    // Cache fetched fallback city data to avoid re-fetching on tab switches
    let fallbackCityCache = {};

    // Cache fetched expanded city data to avoid re-fetching on tab switches
    let expandedCityCache = {};

    // Haversine formula: straight-line distance in miles between two lat/lon points
    function distanceMiles(lat1, lon1, lat2, lon2) {
      const R = 3958.8; // Earth's mean radius in miles
      const toRad = x => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // Returns true for WMO codes that qualify as "partly sunny or better" (codes 0, 1, 2)
    function isPartlySunnyOrBetter(code) {
      return code === 0 || code === 1 || code === 2;
    }

    // Returns true if any hour in the given dayIndex has a sunny/partly-sunny code.
    // Falls back to the daily code when hourly data is unavailable.
    function hasSunnyHour(cityData, dayIndex) {
      if (cityData.hourlyData && cityData.hourlyData.weather_code) {
        const startHour = dayIndex * 24;
        const endHour = startHour + 24;
        const codes = cityData.hourlyData.weather_code;
        for (let i = startHour; i < endHour && i < codes.length; i++) {
          if (isPartlySunnyOrBetter(codes[i])) return true;
        }
        return false;
      }
      // Fallback: use daily code
      return cityData.dailyData && isPartlySunnyOrBetter(cityData.dailyData.weather_code[dayIndex]);
    }

    // Returns the best (sunniest) hourly weather code for the given day, or the daily code as fallback.
    function bestSunnyCode(cityData, dayIndex) {
      if (cityData.hourlyData && cityData.hourlyData.weather_code) {
        const startHour = dayIndex * 24;
        const endHour = startHour + 24;
        const codes = cityData.hourlyData.weather_code;
        let best = null;
        for (let i = startHour; i < endHour && i < codes.length; i++) {
          if (isPartlySunnyOrBetter(codes[i])) {
            if (best === null || codes[i] < best) best = codes[i];
          }
        }
        if (best !== null) return best;
      }
      return cityData.dailyData ? cityData.dailyData.weather_code[dayIndex] : null;
    }

    // Track current markers and selected day
    let markers = [];
    let selectedDayIndex = 0;
    
    // Calculate days needed for forecast (up to next Sunday)
    function calculateForecastDays() {
      const today = new Date();
      const dayOfWeek = today.getDay(); // 0 = Sunday, 6 = Saturday
      
      // Days until next Saturday (if today is Sat, use today = 0 days)
      const daysToSat = dayOfWeek === 6 ? 0 : (6 - dayOfWeek);
      // Days until next Sunday (if today is Sun, use today = 0 days)
      const daysToSun = dayOfWeek === 0 ? 0 : (7 - dayOfWeek);
      
      return {
        daysToSat,
        daysToSun,
        forecastDaysNeeded: Math.max(daysToSun + 1, 2) // At least 2 for today/tomorrow
      };
    }
    
    // Format date labels for tabs
    function updateTabLabels() {
      const today = new Date();
      const { daysToSat, daysToSun } = calculateForecastDays();
      
      const satDate = new Date(today);
      satDate.setDate(today.getDate() + daysToSat);
      
      const sunDate = new Date(today);
      sunDate.setDate(today.getDate() + daysToSun);
      
      const formatDate = (date) => {
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      };
      
      document.getElementById('satTab').textContent = `Saturday ${formatDate(satDate)}`;
      document.getElementById('satTab').dataset.dayIndex = daysToSat;
      
      document.getElementById('sunTab').textContent = `Sunday ${formatDate(sunDate)}`;
      document.getElementById('sunTab').dataset.dayIndex = daysToSun;
    }

    // Initialize map centered on PNW
    const map = L.map('map').setView([47.5, -121.5], 7);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // Add legend
    const legend = L.control({ position: 'topright' });
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'legend');
      const isMobile = window.matchMedia(MOBILE_BREAKPOINT).matches;
      div.innerHTML = `
        <div class="panel-header">
          <h4>Weather</h4><span class="panel-toggle">▼</span>
        </div>
        <div class="panel-body">
          <div class="legend-item"><span class="legend-emoji">☀️</span> Clear/Sunny</div>
          <div class="legend-item"><span class="legend-emoji">🌤️</span> Mainly Clear</div>
          <div class="legend-item"><span class="legend-emoji">⛅</span> Partly Cloudy</div>
          <div class="legend-item"><span class="legend-emoji">☁️</span> Cloudy</div>
          <div class="legend-item"><span class="legend-emoji">🌧️</span> Rain</div>
          <div class="legend-item"><span class="legend-emoji">❄️</span> Snow</div>
        </div>
      `;
      if (isMobile) div.classList.add('panel-collapsed');
      L.DomEvent.on(div.querySelector('.panel-header'), 'click', function() {
        div.classList.toggle('panel-collapsed');
      });
      return div;
    };
    legend.addTo(map);

    // Top 3 Closest Sunshine panel (topleft)
    const top3Control = L.control({ position: 'topleft' });
    top3Control.onAdd = function() {
      const div = L.DomUtil.create('div', 'top3-panel');
      const isMobile = window.matchMedia(MOBILE_BREAKPOINT).matches;
      div.innerHTML = `
        <div class="panel-header">
          <h4>🏆 3 Closest Sunny Spots</h4><span class="panel-toggle">▼</span>
        </div>
        <div class="panel-body">
          <div id="top3Content"><div class="top3-none">Loading...</div></div>
        </div>
      `;
      if (isMobile) div.classList.add('panel-collapsed');
      L.DomEvent.on(div.querySelector('.panel-header'), 'click', function() {
        div.classList.toggle('panel-collapsed');
      });
      return div;
    };
    top3Control.addTo(map);

    // Update the Top 3 Closest Sunshine panel for the given day
    async function updateTop3Panel(dayIndex) {
      const panel = document.getElementById('top3Content');
      if (!panel) return;

      panel.innerHTML = '<div class="top3-none">Searching...</div>';

      const { forecastDaysNeeded } = calculateForecastDays();

      // Collect qualifying spots from the already-fetched main cities
      const qualifying = allCityData
        .filter(c => c.dailyData && hasSunnyHour(c, dayIndex))
        .map(c => ({
          name: c.name,
          lat: c.lat,
          lon: c.lon,
          weatherCode: bestSunnyCode(c, dayIndex),
          distance: distanceMiles(SEATTLE_LAT, SEATTLE_LON, c.lat, c.lon)
        }))
        .sort((a, b) => a.distance - b.distance);

      let top3 = qualifying.slice(0, 3);

      // If fewer than 3 found, expand search to fallback outdoor-hub cities
      if (top3.length < 3) {
        const alreadyFetched = new Set(allCityData.map(c => c.name));
        const fallbacksSorted = fallbackCities
          .filter(c => !alreadyFetched.has(c.name))
          .map(c => ({ ...c, distance: distanceMiles(SEATTLE_LAT, SEATTLE_LON, c.lat, c.lon) }))
          .sort((a, b) => a.distance - b.distance);

        for (const city of fallbacksSorted) {
          if (top3.length >= 3) break;

          // Use cached result if available
          let cityData = fallbackCityCache[city.name];
          if (!cityData) {
            cityData = await fetchWeatherForCity(city, forecastDaysNeeded);
            fallbackCityCache[city.name] = cityData;
          }

          if (hasSunnyHour(cityData, dayIndex)) {
            top3.push({
              name: city.name,
              lat: city.lat,
              lon: city.lon,
              weatherCode: bestSunnyCode(cityData, dayIndex),
              distance: city.distance
            });
          }
        }
      }

      // If still fewer than 3, search progressively farther cities at expanding distances
      if (top3.length < 3) {
        const alreadySearched = new Set([
          ...allCityData.map(c => c.name),
          ...Object.keys(fallbackCityCache),
        ]);
        const expandedSorted = expandedCities
          .filter(c => !alreadySearched.has(c.name))
          .map(c => ({ ...c, distance: distanceMiles(SEATTLE_LAT, SEATTLE_LON, c.lat, c.lon) }))
          .sort((a, b) => a.distance - b.distance);

        if (expandedSorted.length > 0) {
          panel.innerHTML = '<div class="top3-none">Searching further out...</div>';
        }

        for (const city of expandedSorted) {
          if (top3.length >= 3) break;

          let cityData = expandedCityCache[city.name];
          if (!cityData) {
            cityData = await fetchWeatherForCity(city, forecastDaysNeeded);
            expandedCityCache[city.name] = cityData;
          }

          if (hasSunnyHour(cityData, dayIndex)) {
            top3.push({
              name: city.name,
              lat: city.lat,
              lon: city.lon,
              weatherCode: bestSunnyCode(cityData, dayIndex),
              distance: city.distance,
            });
          }
        }
      }

      // Sort by distance so medals always reflect true proximity to Seattle
      top3.sort((a, b) => a.distance - b.distance);

      if (top3.length === 0) {
        panel.innerHTML = '<div class="top3-none">No sunny spots found 😔</div>';
        return;
      }

      const medals = ['🥇', '🥈', '🥉'];
      panel.innerHTML = top3.map((city, i) => {
        const weather = weatherCodes[city.weatherCode] || UNKNOWN_WEATHER;
        return `
          <div class="top3-item">
            <span class="top3-rank">${medals[i]}</span>
            <span class="top3-emoji">${weather.emoji}</span>
            <div class="top3-info">
              <div class="top3-city">${city.name}</div>
              <div class="top3-dist">${Math.round(city.distance)} mi from Seattle</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Create custom emoji marker
    function createEmojiIcon(emoji, isSunny) {
      return L.divIcon({
        html: `<div style="font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); filter: ${isSunny ? 'drop-shadow(0 0 8px gold)' : 'none'};">${emoji}</div>`,
        className: 'emoji-marker',
        iconSize: [40, 40],
        iconAnchor: [20, 20],
        popupAnchor: [0, -20]
      });
    }

    async function fetchWeatherForCity(city, forecastDays) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=weather_code,temperature_2m_max,temperature_2m_min&hourly=weather_code&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FLos_Angeles&forecast_days=${forecastDays}`;
      
      try {
        const response = await fetch(url);
        const data = await response.json();
        
        return {
          ...city,
          dailyData: data.daily,
          hourlyData: data.hourly || null,
          currentTemp: Math.round(data.current.temperature_2m)
        };
      } catch (error) {
        console.error(`Failed to fetch weather for ${city.name}:`, error);
        return {
          ...city,
          dailyData: null,
          hourlyData: null,
          currentTemp: '--'
        };
      }
    }
    
    function getWeatherForDay(cityData, dayIndex) {
      if (!cityData.dailyData || cityData.dailyData.weather_code[dayIndex] === undefined) {
        return {
          weather: { desc: 'Unavailable', emoji: '❓', sunny: false },
          highTemp: '--',
          lowTemp: '--',
          isSunny: false
        };
      }
      
      const weatherCode = bestSunnyCode(cityData, dayIndex) ?? cityData.dailyData.weather_code[dayIndex];
      const weather = weatherCodes[weatherCode] || UNKNOWN_WEATHER;
      
      return {
        weather,
        highTemp: Math.round(cityData.dailyData.temperature_2m_max[dayIndex]),
        lowTemp: Math.round(cityData.dailyData.temperature_2m_min[dayIndex]),
        isSunny: hasSunnyHour(cityData, dayIndex)
      };
    }
    
    // Store fetched data globally
    let allCityData = [];
    
    function clearMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
    }
    
    function displayWeatherForDay(dayIndex) {
      clearMarkers();
      selectedDayIndex = dayIndex;
      
      const isToday = dayIndex === 0;
      
      allCityData.forEach(cityData => {
        const dayWeather = getWeatherForDay(cityData, dayIndex);
        const icon = createEmojiIcon(dayWeather.weather.emoji, dayWeather.isSunny);
        const marker = L.marker([cityData.lat, cityData.lon], { icon }).addTo(map);
        
        const tempDisplay = isToday 
          ? `Currently: ${cityData.currentTemp}°F<br>High: ${dayWeather.highTemp}°F / Low: ${dayWeather.lowTemp}°F`
          : `High: ${dayWeather.highTemp}°F / Low: ${dayWeather.lowTemp}°F`;
        
        marker.bindPopup(`
          <div class="city-popup">
            <h3>${cityData.name}</h3>
            <div class="weather-emoji">${dayWeather.weather.emoji}</div>
            <div class="conditions">${dayWeather.weather.desc}</div>
            <div class="temp">${tempDisplay}</div>
            ${dayWeather.isSunny ? '<p style="color: gold; font-weight: bold; margin-top: 0.5rem;">☀️ Sunny!</p>' : ''}
          </div>
        `);
        
        markers.push(marker);
      });
      
      // Log sunny cities
      const sunnyCities = allCityData.filter(c => getWeatherForDay(c, dayIndex).isSunny);
      console.log(`Sunny cities for day ${dayIndex}:`, sunnyCities.map(c => c.name).join(', ') || 'None');
    }

    async function updateAllWeather() {
      const loading = document.getElementById('loading');
      loading.classList.remove('hidden');
      
      const { forecastDaysNeeded } = calculateForecastDays();
      
      // Clear fallback cache on each refresh so data stays fresh
      fallbackCityCache = {};
      expandedCityCache = {};

      // Fetch all city weather in parallel
      const weatherPromises = cities.map(city => fetchWeatherForCity(city, forecastDaysNeeded));
      allCityData = await Promise.all(weatherPromises);
      
      // Display weather for currently selected day
      displayWeatherForDay(selectedDayIndex);
      
      // Update timestamp
      document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
      
      loading.classList.add('hidden');

      // Update Top 3 panel asynchronously (may fetch additional fallback data)
      updateTop3Panel(selectedDayIndex);
    }
    
    // Tab click handlers
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        let dayIndex;
        const dayAttr = tab.dataset.day;
        
        if (dayAttr === 'sat') {
          dayIndex = parseInt(tab.dataset.dayIndex);
        } else if (dayAttr === 'sun') {
          dayIndex = parseInt(tab.dataset.dayIndex);
        } else {
          dayIndex = parseInt(dayAttr);
        }
        
        displayWeatherForDay(dayIndex);
        updateTop3Panel(dayIndex);
      });
    });

    // Initialize
    updateTabLabels();
    updateAllWeather();
    
    // Refresh every 15 minutes
    setInterval(updateAllWeather, 15 * 60 * 1000);
  </script>
</body>
</html>
